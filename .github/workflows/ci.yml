# ============================================================
# CI Pipeline — LotoResults (Xổ Số Live)
# ============================================================
# Triggers: push/PR to main & develop branches
# Jobs: lint → test → build (backend & frontend in parallel)
# ============================================================

name: 🎰 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Backend: Lint + Test + Build
  # ──────────────────────────────────────────────
  backend:
    name: 🔧 Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        run: npm test -- --ci --coverage --forceExit
        env:
          NODE_ENV: test

      - name: 📊 Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Frontend: Lint + TypeCheck + Build
  # ──────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🔍 Type check
        run: npx tsc -b --noEmit

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Quality Gate — all checks must pass
  # ──────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ One or more jobs failed!"
            echo "   Backend:  ${{ needs.backend.result }}"
            echo "   Frontend: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "✅ All checks passed!"
