# ============================================================
# CD Pipeline — LotoResults (Xổ Số Live)
# ============================================================
# Triggers: push tag v*, manual dispatch
# Jobs: build Docker images → push to registry → deploy
# ============================================================

name: 🚀 CD Pipeline

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Run CI first
  # ──────────────────────────────────────────────
  ci:
    name: 🔄 Run CI
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # Build and Push Docker Images
  # ──────────────────────────────────────────────
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    name: 🟡 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event.inputs.environment == 'staging' || github.ref_type == 'tag'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "🟡 Deploying to STAGING..."
          echo "   Image tag: ${{ github.sha }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TODO: Add your deployment commands here"
          echo "  Options:"
          echo "    • SSH + docker compose pull && up"
          echo "    • kubectl apply"
          echo "    • AWS ECS update-service"
          echo "    • Azure Container Apps revision"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🏥 Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          # curl -sf "${{ vars.STAGING_URL }}/health" || exit 1
          echo "✅ Staging deployment healthy!"

  # ──────────────────────────────────────────────
  # Deploy to Production
  # ──────────────────────────────────────────────
  deploy-production:
    name: 🟢 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production' || github.ref_type == 'tag'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Production
        run: |
          echo "🟢 Deploying to PRODUCTION..."
          echo "   Image tag: ${{ github.sha }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TODO: Add your production deploy commands"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🏥 Health Check
        run: |
          echo "Waiting for production deployment to stabilize..."
          sleep 15
          # curl -sf "${{ vars.PRODUCTION_URL }}/health" || exit 1
          echo "✅ Production deployment healthy!"

      - name: 📣 Notify deployment
        if: success()
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "   Version: ${{ github.ref_name }}"
          echo "   Deployed by: ${{ github.actor }}"
          echo "   Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
